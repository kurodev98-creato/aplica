<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Divina Olhar | Bruna Ribeiro Beauty</title>
    
    <meta name="description" content="Bruna Ribeiro Beauty – Extensão de cílios e Design em Linhares, ES.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="icon" href="img/favicon.png">
</head>

<body data-bs-spy="scroll" data-bs-target="#main-nav">

    <nav id="main-nav" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="img/logo.png" alt="Logo" width="40" class="me-2">
                <span>Studio Divina Olhar</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#sobre">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link" href="#servicos">Serviços</a></li>
                    <li class="nav-item"><a class="nav-link" href="#agende">Agende</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contato">Contato</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header id="hero" class="hero-section text-center text-white d-flex align-items-center">
        <div class="container">
            <h1 class="display-3 fw-bold">Realce sua beleza</h1>
            <p class="lead">Técnicas avançadas em extensões e design.</p>
            <a href="#agende" class="btn btn-warning btn-lg mt-3">Agendar Agora</a>
        </div>
    </header>

    <section id="servicos" class="py-5 bg-light">
        <div class="container">
            <h2 class="text-center mb-5">Nossos Serviços</h2>
            <div class="text-center mb-4">
                <button class="btn btn-outline-dark filter-btn active" data-filter="all">Todos</button>
                <button class="btn btn-outline-dark filter-btn" data-filter="cilios">Cílios</button>
                <button class="btn btn-outline-dark filter-btn" data-filter="sobrancelha">Sobrancelhas</button>
            </div>
            <div class="row g-4" id="services-container">
                </div>
        </div>
    </section>

    <section id="contato" class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <h2 class="text-center mb-4">Fale com a Gente</h2>
                    <form action="https://formspree.io/f/xrejzqjw" method="POST" class="p-4 shadow rounded bg-white">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email" name="_replyto" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mensagem</label>
                            <textarea name="message" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Enviar Mensagem</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section id="agende" class="py-5 bg-light">
        <div class="container">
            <h2 class="text-center mb-4">Agendamento Online</h2>
            <div class="calendly-inline-widget" data-url="https://calendly.com/brunaribeirobeauty" style="min-width:320px;height:700px;"></div>
        </div>
    </section>

    <a href="https://wa.me/5527999999999" class="whatsapp-btn shadow" target="_blank">
        <img src="img/whatsapp-icon.png" alt="WhatsApp" width="35">
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    <script src="main.js"></script>
</body>
</html>
